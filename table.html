<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>HTML Table</title>
</head>
<body>
    <table border="1">
        <h1>Company Information</h1>
        <thead>
            <tr>
                <th>Company</th>

            </tr>
        </thead>
        <tbody>
            <tr>
                <td>TCS</td>
                <td>India</td>
                <td>$22.17B</td>
            </tr>
            <tr>
                <td>Infosys</td>
                <td>India</td>
                <td>$13.56B</td>
            </tr>
        <tr>
            <td>Wipro</td>
            <td>India</td>
            <td>$8.47B</td>
        </tr>
        <tr>
            <td>Apple</td>
            <td>USA</td>
            <td>$274.52B</td>
        </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="3">Data Source: Company Annual Reports</td>
            </tr>
        </tfoot>
        </table>

</body>
</html>
